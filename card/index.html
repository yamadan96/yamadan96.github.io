<main>
  <article>
    <h2>制作意図</h2>
    <p>自分のオリジナルロゴを取り入れたネームカードです。</p>
    <p>私たちは大学生を対象としたマッチングアプリを提供している会社です。</p>
    <p>「スナイパー」のように狙った異性をゲットするという意味を込めて、「スナイパー」の文字と矢のイラストを入れたロゴを作成しました。</p>
    <p>前回の課題だったオリジナルキャラクターを書くという課題でクリスマスに関連したキャラクタを作ってしまったので、恋愛と繋げてしまいました。</p>
    <p>冬も近いということで雪だるまも載せてみました。</p>
    <figure>
      <img id="sample" style="width: 100%;" src="./img/card.png" alt="「早川由紀の名刺」">
      <figcaption class=“caption”>「山田悠人の名刺（裏・表）」</figcaption>
    </figure>
</article>
</main>
